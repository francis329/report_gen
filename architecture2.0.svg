<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="frontendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-color-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-color-opacity:1" />
    </linearGradient>
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e;stop-color-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-color-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-color-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-color-opacity:1" />
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-color-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-color-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-color-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-color-opacity:1" />
    </linearGradient>
    <linearGradient id="modelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-color-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-color-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="800" fill="#f8f9fa"/>

  <!-- 标题 -->
  <text x="600" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">
    智能报告生成 Agent 系统架构
  </text>

  <!-- ==================== 前端层 ==================== -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="1100" height="100" rx="12" fill="url(#frontendGrad)" opacity="0.1"/>
    <rect x="0" y="0" width="1100" height="100" rx="12" fill="none" stroke="url(#frontendGrad)" stroke-width="2"/>
    <text x="550" y="-10" text-anchor="middle" font-size="14" font-weight="bold" fill="#667eea">前端层 (Frontend)</text>

    <!-- Vue App -->
    <rect x="30" y="15" width="180" height="70" rx="8" fill="url(#frontendGrad)"/>
    <text x="120" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Vue 3</text>
    <text x="120" y="60" text-anchor="middle" font-size="11" fill="white">App.vue</text>

    <!-- Element Plus -->
    <rect x="230" y="15" width="180" height="70" rx="8" fill="url(#frontendGrad)" opacity="0.8"/>
    <text x="320" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Element Plus</text>
    <text x="320" y="60" text-anchor="middle" font-size="11" fill="white">UI 组件库</text>

    <!-- API Client -->
    <rect x="430" y="15" width="180" height="70" rx="8" fill="url(#frontendGrad)" opacity="0.7"/>
    <text x="520" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="white">API Client</text>
    <text x="520" y="60" text-anchor="middle" font-size="11" fill="white">client.js</text>

    <!-- WebSocket -->
    <rect x="630" y="15" width="180" height="70" rx="8" fill="url(#frontendGrad)" opacity="0.6"/>
    <text x="720" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="white">WebSocket</text>
    <text x="720" y="60" text-anchor="middle" font-size="11" fill="white">实时通信</text>

    <!-- ECharts -->
    <rect x="830" y="15" width="180" height="70" rx="8" fill="url(#frontendGrad)" opacity="0.5"/>
    <text x="920" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="white">ECharts</text>
    <text x="920" y="60" text-anchor="middle" font-size="11" fill="white">图表渲染</text>
  </g>

  <!-- ==================== API 层 ==================== -->
  <g transform="translate(50, 210)">
    <rect x="0" y="0" width="1100" height="100" rx="12" fill="url(#backendGrad)" opacity="0.1"/>
    <rect x="0" y="0" width="1100" height="100" rx="12" fill="none" stroke="url(#backendGrad)" stroke-width="2"/>
    <text x="550" y="-10" text-anchor="middle" font-size="14" font-weight="bold" fill="#11998e">API 层 (FastAPI)</text>

    <!-- main.py -->
    <rect x="30" y="15" width="200" height="70" rx="8" fill="url(#backendGrad)"/>
    <text x="130" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="white">main.py</text>
    <text x="130" y="60" text-anchor="middle" font-size="11" fill="white">REST API + WebSocket</text>

    <!-- 路由分组 -->
    <rect x="250" y="15" width="160" height="32" rx="6" fill="url(#backendGrad)" opacity="0.7"/>
    <text x="330" y="35" text-anchor="middle" font-size="11" fill="white">会话管理</text>

    <rect x="420" y="15" width="160" height="32" rx="6" fill="url(#backendGrad)" opacity="0.7"/>
    <text x="500" y="35" text-anchor="middle" font-size="11" fill="white">文件上传</text>

    <rect x="590" y="15" width="160" height="32" rx="6" fill="url(#backendGrad)" opacity="0.7"/>
    <text x="670" y="35" text-anchor="middle" font-size="11" fill="white">聊天交互</text>

    <rect x="760" y="15" width="160" height="32" rx="6" fill="url(#backendGrad)" opacity="0.7"/>
    <text x="840" y="35" text-anchor="middle" font-size="11" fill="white">报告生成</text>

    <rect x="930" y="15" width="160" height="32" rx="6" fill="url(#backendGrad)" opacity="0.7"/>
    <text x="1010" y="35" text-anchor="middle" font-size="11" fill="white">图表数据</text>

    <rect x="590" y="53" width="160" height="32" rx="6" fill="url(#backendGrad)" opacity="0.7"/>
    <text x="670" y="73" text-anchor="middle" font-size="11" fill="white">流式聊天</text>

    <rect x="760" y="53" width="160" height="32" rx="6" fill="url(#backendGrad)" opacity="0.7"/>
    <text x="840" y="73" text-anchor="middle" font-size="11" fill="white">健康检查</text>
  </g>

  <!-- ==================== Agent 层 ==================== -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="700" height="180" rx="12" fill="url(#agentGrad)" opacity="0.1"/>
    <rect x="0" y="0" width="700" height="180" rx="12" fill="none" stroke="url(#agentGrad)" stroke-width="2"/>
    <text x="350" y="-10" text-anchor="middle" font-size="14" font-weight="bold" fill="#f5576c">Agent 层 (智能核心)</text>

    <!-- ToolCallingAgent -->
    <rect x="20" y="15" width="200" height="75" rx="8" fill="url(#agentGrad)"/>
    <text x="120" y="38" text-anchor="middle" font-size="12" font-weight="bold" fill="white">ToolCallingAgent</text>
    <text x="120" y="56" text-anchor="middle" font-size="10" fill="white">tool_calling.py</text>
    <text x="120" y="72" text-anchor="middle" font-size="9" fill="white">ReAct 循环 | LLM 调用</text>

    <!-- ReportAgent -->
    <rect x="240" y="15" width="200" height="75" rx="8" fill="url(#agentGrad)" opacity="0.9"/>
    <text x="340" y="38" text-anchor="middle" font-size="12" font-weight="bold" fill="white">ReportAgent</text>
    <text x="340" y="56" text-anchor="middle" font-size="10" fill="white">report_agent.py</text>
    <text x="340" y="72" text-anchor="middle" font-size="9" fill="white">规划 - 执行 - 生成</text>

    <!-- ReportPlanner -->
    <rect x="460" y="15" width="110" height="35" rx="6" fill="url(#agentGrad)" opacity="0.7"/>
    <text x="515" y="37" text-anchor="middle" font-size="10" fill="white">ReportPlanner</text>

    <!-- ReportExecutor -->
    <rect x="580" y="15" width="110" height="35" rx="6" fill="url(#agentGrad)" opacity="0.7"/>
    <text x="635" y="37" text-anchor="middle" font-size="10" fill="white">ReportExecutor</text>

    <!-- ToolRegistry -->
    <rect x="20" y="100" width="200" height="65" rx="8" fill="url(#agentGrad)" opacity="0.8"/>
    <text x="120" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="white">ToolRegistry</text>
    <text x="120" y="142" text-anchor="middle" font-size="9" fill="white">registry.py</text>
    <text x="120" y="157" text-anchor="middle" font-size="9" fill="white">工具注册中心</text>

    <!-- BaseAgent -->
    <rect x="240" y="100" width="150" height="35" rx="6" fill="url(#agentGrad)" opacity="0.6"/>
    <text x="315" y="122" text-anchor="middle" font-size="10" fill="white">BaseAgent</text>

    <!-- WebSocketManager -->
    <rect x="400" y="100" width="150" height="35" rx="6" fill="url(#agentGrad)" opacity="0.6"/>
    <text x="478" y="122" text-anchor="middle" font-size="10" fill="white">WebSocketManager</text>

    <!-- PerformanceLogger -->
    <rect x="560" y="100" width="130" height="35" rx="6" fill="url(#agentGrad)" opacity="0.6"/>
    <text x="625" y="122" text-anchor="middle" font-size="10" fill="white">PerformanceLogger</text>
  </g>

  <!-- ==================== 工具层 ==================== -->
  <g transform="translate(780, 340)">
    <rect x="0" y="0" width="370" height="180" rx="12" fill="url(#toolGrad)" opacity="0.1"/>
    <rect x="0" y="0" width="370" height="180" rx="12" fill="none" stroke="url(#toolGrad)" stroke-width="2"/>
    <text x="185" y="-10" text-anchor="middle" font-size="14" font-weight="bold" fill="#00bcd4">工具层 (Tools)</text>

    <!-- Data Tools -->
    <rect x="15" y="15" width="160" height="50" rx="8" fill="url(#toolGrad)"/>
    <text x="95" y="35" text-anchor="middle" font-size="11" font-weight="bold" fill="white">数据工具</text>
    <text x="95" y="52" text-anchor="middle" font-size="9" fill="white">AnalyzeDataTool</text>

    <!-- Chart Tools -->
    <rect x="185" y="15" width="160" height="50" rx="8" fill="url(#toolGrad)" opacity="0.9"/>
    <text x="265" y="35" text-anchor="middle" font-size="11" font-weight="bold" fill="white">图表工具</text>
    <text x="265" y="52" text-anchor="middle" font-size="9" fill="white">GenerateChartTool</text>

    <!-- Report Tools -->
    <rect x="15" y="75" width="160" height="50" rx="8" fill="url(#toolGrad)" opacity="0.8"/>
    <text x="95" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="white">报告工具</text>
    <text x="95" y="112" text-anchor="middle" font-size="9" fill="white">GenerateDynamicReport</text>

    <!-- Base Tool -->
    <rect x="185" y="75" width="160" height="30" rx="6" fill="url(#toolGrad)" opacity="0.6"/>
    <text x="265" y="95" text-anchor="middle" font-size="10" fill="white">BaseTool</text>
  </g>

  <!-- ==================== 服务层 ==================== -->
  <g transform="translate(50, 550)">
    <rect x="0" y="0" width="540" height="100" rx="12" fill="url(#dataGrad)" opacity="0.1"/>
    <rect x="0" y="0" width="540" height="100" rx="12" fill="none" stroke="url(#dataGrad)" stroke-width="2"/>
    <text x="270" y="-10" text-anchor="middle" font-size="14" font-weight="bold" fill="#fa709a">服务层 (Services)</text>

    <!-- SessionManager -->
    <rect x="20" y="15" width="180" height="70" rx="8" fill="url(#dataGrad)"/>
    <text x="110" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="white">SessionManager</text>
    <text x="110" y="58" text-anchor="middle" font-size="10" fill="white">会话管理 | 数据存储</text>
    <text x="110" y="74" text-anchor="middle" font-size="9" fill="white">session_manager.py</text>

    <!-- FileHandler -->
    <rect x="220" y="15" width="140" height="50" rx="8" fill="url(#dataGrad)" opacity="0.8"/>
    <text x="290" y="38" text-anchor="middle" font-size="11" font-weight="bold" fill="white">FileHandler</text>
    <text x="290" y="54" text-anchor="middle" font-size="9" fill="white">文件处理</text>

    <!-- ChartBuilder -->
    <rect x="380" y="15" width="140" height="50" rx="8" fill="url(#dataGrad)" opacity="0.7"/>
    <text x="450" y="38" text-anchor="middle" font-size="11" font-weight="bold" fill="white">ChartBuilder</text>
    <text x="450" y="54" text-anchor="middle" font-size="9" fill="white">图表构建</text>
  </g>

  <!-- ==================== 模型层 ==================== -->
  <g transform="translate(620, 550)">
    <rect x="0" y="0" width="260" height="100" rx="12" fill="url(#modelGrad)" opacity="0.1"/>
    <rect x="0" y="0" width="260" height="100" rx="12" fill="none" stroke="url(#modelGrad)" stroke-width="2"/>
    <text x="130" y="-10" text-anchor="middle" font-size="14" font-weight="bold" fill="#a8edea">模型层 (Models)</text>

    <!-- Schemas -->
    <rect x="15" y="15" width="110" height="70" rx="8" fill="url(#modelGrad)"/>
    <text x="70" y="40" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Session</text>
    <text x="70" y="56" text-anchor="middle" font-size="10" fill="#555">Message</text>
    <text x="70" y="72" text-anchor="middle" font-size="10" fill="#555">FileInfo</text>

    <!-- Report Model -->
    <rect x="135" y="15" width="110" height="70" rx="8" fill="url(#modelGrad)" opacity="0.8"/>
    <text x="190" y="40" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">ReportPlan</text>
    <text x="190" y="56" text-anchor="middle" font-size="10" fill="#555">ChapterResult</text>
    <text x="190" y="72" text-anchor="middle" font-size="10" fill="#555">ChartDataQuery</text>
  </g>

  <!-- ==================== 基础设施层 ==================== -->
  <g transform="translate(910, 550)">
    <rect x="0" y="0" width="240" height="100" rx="12" fill="#e9ecef" stroke="#dee2e6" stroke-width="2"/>
    <text x="120" y="-10" text-anchor="middle" font-size="14" font-weight="bold" fill="#495057">基础设施</text>

    <!-- DashScope AI -->
    <rect x="15" y="15" width="100" height="35" rx="6" fill="#667eea"/>
    <text x="65" y="38" text-anchor="middle" font-size="10" fill="white">DashScope AI</text>
    <text x="65" y="52" text-anchor="middle" font-size="9" fill="#666">qwen3.5-flash</text>

    <!-- File Storage -->
    <rect x="125" y="15" width="100" height="35" rx="6" fill="#11998e"/>
    <text x="175" y="38" text-anchor="middle" font-size="10" fill="white">文件存储</text>

    <!-- Config -->
    <rect x="15" y="55" width="100" height="30" rx="6" fill="#f5576c" opacity="0.7"/>
    <text x="65" y="75" text-anchor="middle" font-size="10" fill="white">config.py</text>

    <!-- Utils -->
    <rect x="125" y="55" width="100" height="30" rx="6" fill="#4facfe" opacity="0.7"/>
    <text x="175" y="75" text-anchor="middle" font-size="10" fill="white">Utils</text>
  </g>

  <!-- ==================== 数据流向箭头 ==================== -->
  <!-- 前端 -> API -->
  <line x1="600" y1="180" x2="600" y2="205" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- API -> Agent -->
  <line x1="600" y1="310" x2="600" y2="335" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Agent -> Tools -->
  <line x1="750" y1="430" x2="775" y2="430" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Agent -> Services -->
  <line x1="400" y1="520" x2="400" y2="545" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Services -> Models -->
  <line x1="590" y1="600" x2="615" y2="600" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Tools -> Services -->
  <line x1="965" y1="520" x2="965" y2="545" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ==================== 图例 ==================== -->
  <g transform="translate(50, 680)">
    <rect x="0" y="0" width="1100" height="100" rx="12" fill="white" stroke="#dee2e6" stroke-width="1"/>
    <text x="60" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">图例说明</text>

    <!-- 图例项 -->
    <rect x="120" y="35" width="20" height="20" rx="4" fill="url(#frontendGrad)"/>
    <text x="145" y="50" font-size="11" fill="#333">前端层 - Vue 3 + Element Plus</text>

    <rect x="380" y="35" width="20" height="20" rx="4" fill="url(#backendGrad)"/>
    <text x="405" y="50" font-size="11" fill="#333">API 层 - FastAPI</text>

    <rect x="580" y="35" width="20" height="20" rx="4" fill="url(#agentGrad)"/>
    <text x="605" y="50" font-size="11" fill="#333">Agent 层 - 智能决策核心</text>

    <rect x="820" y="35" width="20" height="20" rx="4" fill="url(#toolGrad)"/>
    <text x="845" y="50" font-size="11" fill="#333">工具层 - 可插拔工具</text>

    <rect x="120" y="65" width="20" height="20" rx="4" fill="url(#dataGrad)"/>
    <text x="145" y="80" font-size="11" fill="#333">服务层 - 业务逻辑</text>

    <rect x="380" y="65" width="20" height="20" rx="4" fill="url(#modelGrad)"/>
    <text x="405" y="80" font-size="11" fill="#333">模型层 - 数据模型</text>

    <rect x="580" y="65" width="20" height="20" rx="4" fill="#667eea"/>
    <text x="605" y="80" font-size="11" fill="#333">外部服务 - DashScope AI</text>

    <rect x="820" y="65" width="20" height="20" rx="4" fill="#e9ecef" stroke="#dee2e6"/>
    <text x="845" y="80" font-size="11" fill="#333">基础设施 - 配置/工具类</text>
  </g>

  <!-- 底部信息 -->
  <text x="600" y="790" text-anchor="middle" font-size="11" fill="#999">
    系统架构 v2.0 | Tool-Calling Agent + ReportAgent 双核心驱动
  </text>
</svg>
